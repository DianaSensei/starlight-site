name: Update version.json on new DevTool release

on:
  repository_dispatch:
    types: [devtool-release]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest release from GitHub API
        id: release
        run: |
          DATA=$(curl -s \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/DianaSensei/developer-desktop-utils/releases/latest)
          echo "tag=$(echo $DATA | jq -r '.tag_name')" >> $GITHUB_OUTPUT
          echo "url=$(echo $DATA | jq -r '.html_url')" >> $GITHUB_OUTPUT

      - name: Write public/version.json
        run: |
          echo '{"version":"${{ steps.release.outputs.tag }}","url":"${{ steps.release.outputs.url }}"}' \
            > public/version.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/version.json
          git commit -m "chore: update version to ${{ steps.release.outputs.tag }}"
          git push
